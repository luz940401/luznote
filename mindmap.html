<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冒險記錄｜心智圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#ebe7de;color:#1d1d1b;min-height:100vh;overflow:hidden}
header{height:54px;background:#fff;border-bottom:1px solid #ddd5c9;display:flex;align-items:center;gap:10px;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:relative;z-index:5}
.logo{font-family:'Noto Serif TC',serif;font-size:17px;flex:1;letter-spacing:.04em}
.logo em{font-family:'Noto Sans TC',sans-serif;font-style:normal;color:#aaa;font-size:11px;margin-left:8px}
.btn{padding:7px 12px;border:1px solid #d8d0c4;border-radius:7px;background:#fff;color:#4c463e;font-size:13px;cursor:pointer;text-decoration:none}
.btn:hover{background:#f7f4ef}
.btn.admin-on{border-color:#9ebc92;background:#f2fbef;color:#315c28}
.zoom-tools{display:flex;align-items:center;gap:4px;border:1px solid #e0d8cc;border-radius:8px;padding:3px;background:#faf8f4}
.zoom-tools .btn{padding:4px 9px;border-color:transparent;background:transparent}
.zoom-label{min-width:46px;text-align:center;font-size:12px;color:#6f665c}
.mode-label{font-size:12px;color:#8a8176;border:1px solid #e0d8cc;border-radius:999px;padding:5px 10px;background:#faf8f4;white-space:nowrap}
#map-wrap{height:calc(100vh - 54px);overflow:auto;cursor:grab}
#map-wrap:active{cursor:grabbing}
#map-space{position:relative;min-width:1200px;min-height:760px}
#map{position:absolute;left:0;top:0;min-width:1200px;min-height:760px;padding:48px 80px;transform-origin:0 0}
.node{position:absolute;width:210px;background:#fff;border:1px solid #d9d0c4;border-left:5px solid #9a8c74;border-radius:8px;padding:10px 12px;box-shadow:0 4px 14px rgba(0,0,0,.08);cursor:grab;transition:transform .15s,box-shadow .15s;touch-action:none;text-align:left}
.node:active{cursor:grabbing}
.node:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.12)}
.node.dragging{transform:none;box-shadow:0 12px 28px rgba(0,0,0,.18);z-index:4}
body:not(.admin-mode) .node{cursor:pointer;touch-action:manipulation}
body:not(.admin-mode) .node:active{cursor:pointer}
body:not(.admin-mode) .edit-form{display:none}
body:not(.admin-mode) #detail-save-btn{display:none}
.node-title{font-size:14px;font-weight:700;line-height:1.35;word-break:break-word}
.node-note{font-size:12px;color:#6f675e;line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;margin-bottom:6px;background:#f0ece5;color:#6b5c4c}
.status{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;margin:0 0 6px 5px;background:#eef3fb;color:#2050a0}
.empty{max-width:420px;margin:120px auto;text-align:center;color:#aaa;border:1px dashed #d9d0c4;border-radius:12px;padding:44px;background:#f8f5ef}
svg{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:10;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{width:100%;max-width:430px;max-height:calc(100vh - 40px);overflow-y:auto;background:#fff;border-radius:14px;border:1px solid #e4ddd4;box-shadow:0 10px 34px rgba(0,0,0,.18);padding:22px}
.modal h3{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:400;margin-bottom:8px}
.modal img{width:100%;max-height:240px;object-fit:contain;border-radius:10px;border:1px solid #e0dbd2;margin:8px 0 12px;background:#f5f3ef;cursor:zoom-in}
.image-fallback{display:none;width:max-content;max-width:100%;border:1px solid #d8c8a8;background:#fffaf0;color:#68460e;border-radius:7px;padding:7px 10px;font-size:12px;text-decoration:none;margin:8px 0 12px}
.modal-note{font-size:14px;color:#333;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.edit-form{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.form-row{display:flex;gap:8px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;flex:1;min-width:120px}
.form-label{font-size:11px;color:#aaa;font-weight:600;letter-spacing:.06em;margin-bottom:3px}
.inp,.sel{width:100%;background:#f7f5f2;border:1px solid #e0dbd4;border-radius:7px;color:#1d1d1b;font-family:'Noto Sans TC',sans-serif;font-size:14px;padding:8px 10px;outline:none}
.inp:focus,.sel:focus{border-color:#a09070;background:#fff}
textarea.inp{min-height:110px;resize:vertical;line-height:1.7}
.hint{font-size:11px;color:#9a8f82;line-height:1.5}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
@media(max-width:700px){
  header{height:auto;min-height:54px;flex-wrap:wrap;padding:10px 12px}
  .logo{width:100%;flex:auto}
  .zoom-tools{order:3}
  .mode-label{order:4}
  #map-wrap{height:calc(100vh - 92px)}
  .modal-bg{padding:10px}
  .modal{max-height:calc(100vh - 20px);max-height:calc(100dvh - 20px);padding:18px}
  .modal img{max-height:45vh;max-height:45dvh}
}
</style>
</head>
<body>
<header>
  <div class="logo">冒險記錄 <em>心智圖視圖</em></div>
  <span class="btn" id="sync-label">讀取中</span>
  <button class="btn" onclick="fitMap()">置中</button>
  <a class="btn" href="./index.html">返回筆記</a>
  <span class="mode-label" id="mode-label">觀看模式</span>
  <div class="zoom-tools">
    <button class="btn" onclick="zoomBy(-0.1)" title="縮小">−</button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button class="btn" onclick="zoomBy(0.1)" title="放大">＋</button>
    <button class="btn" onclick="resetZoom()" title="重設縮放">100%</button>
  </div>
  <button class="btn" id="admin-btn" onclick="toggleAdminMode()">管理者</button>
</header>

<div id="map-wrap">
  <div id="map-space">
    <div id="map">
      <svg id="lines"></svg>
    </div>
  </div>
</div>

<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <span class="tag" id="detail-tag"></span>
    <h3 id="detail-title"></h3>
    <img id="detail-img" alt="" style="display:none">
    <a class="image-fallback" id="detail-img-fallback" target="_blank" rel="noopener">圖片無法顯示，點此開啟原圖</a>
    <div class="modal-note" id="detail-note"></div>
    <div class="edit-form">
      <div class="form-row">
        <div class="form-group"><div class="form-label">標題</div><input class="inp" id="detail-title-inp"></div>
        <div class="form-group" style="flex:0;min-width:100px"><div class="form-label">類型</div><select class="sel" id="detail-tag-inp">
          <option value="事件">事件</option>
          <option value="NPC">NPC</option>
          <option value="地點">地點</option>
          <option value="物品">物品</option>
          <option value="任務">任務</option>
          <option value="組織">組織</option>
          <option value="秘密">秘密</option>
          <option value="線索">線索</option>
        </select></div>
        <div class="form-group" style="flex:0;min-width:100px"><div class="form-label">狀態</div><select class="sel" id="detail-status-inp">
          <option value="進行中">進行中</option>
          <option value="待處理">待處理</option>
          <option value="伏筆">伏筆</option>
          <option value="未揭露">未揭露</option>
          <option value="已揭露">已揭露</option>
          <option value="已完成">已完成</option>
        </select></div>
      </div>
      <div class="form-group"><div class="form-label">Google Drive 圖片連結</div><input class="inp" id="detail-img-inp" placeholder="貼上 Google Drive 分享連結或圖片網址"><div class="hint">Drive 圖片請設定為「知道連結的任何人可查看」。</div></div>
      <div class="form-group"><div class="form-label">描述內容</div><textarea class="inp" id="detail-note-inp"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="detail-save-btn" onclick="saveDetailEdit()">儲存</button>
      <button class="btn" onclick="document.getElementById('detail-modal').classList.remove('open')">關閉</button>
    </div>
  </div>
</div>

<script>
const PALETTE=[
  {border:'#d0d0d0', accent:'#c0c0c0'},
  {border:'#f5c0c0', accent:'#e08080'},
  {border:'#d8c8f8', accent:'#b090e0'},
  {border:'#b8e8c4', accent:'#70c090'},
  {border:'#b8d8f8', accent:'#70a0e0'},
  {border:'#f0dca8', accent:'#e0b050'},
  {border:'#f5c8d8', accent:'#e090b0'},
  {border:'#c8c5be', accent:'#808070'}
];
const TAG_STYLE={
  '事件':{bg:'rgba(220,140,60,.12)',color:'#a05010'},
  'NPC':{bg:'rgba(100,80,200,.12)',color:'#4030a0'},
  '地點':{bg:'rgba(40,140,100,.12)',color:'#1a7858'},
  '物品':{bg:'rgba(180,140,30,.12)',color:'#907010'},
  '任務':{bg:'rgba(50,120,220,.12)',color:'#2050a0'},
  '組織':{bg:'rgba(120,70,35,.12)',color:'#704018'},
  '秘密':{bg:'rgba(150,60,150,.12)',color:'#7a2a7a'},
  '線索':{bg:'rgba(20,160,180,.12)',color:'#0a7a90'}
};
let nodes={},rootIds=[];
const positions={};
let appData={};
let syncTimer=null;
let dragState=null;
let activeDetailId='';
const APP_KEY='adventure-notes-v1';
const LEGACY_APP_KEY='dnd-v3';
const GS_URL_KEY='adventure-notes-gs-url';
const LEGACY_GS_URL_KEY='dnd-gs-url';
let gsUrl=localStorage.getItem(GS_URL_KEY)||localStorage.getItem(LEGACY_GS_URL_KEY)||'';
const ADMIN_HASH_KEY='adventure-notes-mindmap-admin-hash';
const ADMIN_SESSION_KEY='adventure-notes-mindmap-admin-unlocked';
const ADMIN_TOKEN_SESSION_KEY='adventure-notes-mindmap-admin-token';
const ZOOM_KEY='adventure-notes-mindmap-zoom';
let isAdmin=sessionStorage.getItem(ADMIN_SESSION_KEY)==='1';
let adminToken=sessionStorage.getItem(ADMIN_TOKEN_SESSION_KEY)||'';
let zoom=Number(localStorage.getItem(ZOOM_KEY)||'1');
if(!Number.isFinite(zoom))zoom=1;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setSyncLabel(text){document.getElementById('sync-label').textContent=text;}
function nowIso(){return new Date().toISOString();}
function clamp(n,min,max){return Math.min(max,Math.max(min,n));}
function hashAdminPassword(value){
  let h=2166136261;
  const text=String(value||'');
  for(let i=0;i<text.length;i++){
    h^=text.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return (h>>>0).toString(16);
}
function updateAdminUi(){
  document.body.classList.toggle('admin-mode',isAdmin);
  const label=document.getElementById('mode-label');
  const btn=document.getElementById('admin-btn');
  if(label)label.textContent=isAdmin?'管理者模式':'觀看模式';
  if(btn){
    btn.textContent=isAdmin?'鎖定':'管理者';
    btn.classList.toggle('admin-on',isAdmin);
  }
}
function toggleAdminMode(){
  if(isAdmin){
    isAdmin=false;
    adminToken='';
    sessionStorage.removeItem(ADMIN_SESSION_KEY);
    sessionStorage.removeItem(ADMIN_TOKEN_SESSION_KEY);
    updateAdminUi();
    render();
    return;
  }
  const saved=localStorage.getItem(ADMIN_HASH_KEY);
  if(!saved){
    const next=prompt('第一次使用請設定管理者密碼。');
    if(!next)return;
    const again=prompt('請再輸入一次管理者密碼。');
    if(next!==again){alert('兩次密碼不同。');return;}
    localStorage.setItem(ADMIN_HASH_KEY,hashAdminPassword(next));
    isAdmin=true;
    adminToken=next;
  }else{
    const pass=prompt('請輸入管理者密碼。');
    if(!pass)return;
    if(hashAdminPassword(pass)!==saved){alert('管理者密碼不正確。');return;}
    isAdmin=true;
    adminToken=pass;
  }
  sessionStorage.setItem(ADMIN_SESSION_KEY,'1');
  sessionStorage.setItem(ADMIN_TOKEN_SESSION_KEY,adminToken);
  updateAdminUi();
  render();
}
function entityUid(){return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function extractDriveFileId(url){
  const raw=(url||'').trim();
  if(!raw)return '';
  const patterns=[
    /drive\.google\.com\/file\/d\/([^/?#]+)/,
    /drive\.google\.com\/open\?id=([^&#]+)/,
    /drive\.google\.com\/uc\?id=([^&#]+)/,
    /[?&]id=([^&#]+)/
  ];
  for(const p of patterns){
    const m=raw.match(p);
    if(m&&m[1])return decodeURIComponent(m[1]);
  }
  return '';
}
function normalizeImageUrl(url){
  const raw=(url||'').trim();
  const id=extractDriveFileId(raw);
  return id?`https://drive.google.com/thumbnail?id=${encodeURIComponent(id)}&sz=w1200`:raw;
}
function openableImageUrl(url){
  const raw=(url||'').trim();
  const id=extractDriveFileId(raw);
  return id?`https://drive.google.com/file/d/${encodeURIComponent(id)}/view?usp=sharing`:raw;
}
function openImage(url){
  const target=openableImageUrl(url);
  if(target)window.open(target,'_blank','noopener');
}
function normalizeNode(n){
  if(!Array.isArray(n.children))n.children=[];
  if(!n.title)n.title='未命名節點';
  if(!n.tag)n.tag='事件';
  if(!n.status)n.status='進行中';
  if(n.imageUrl)n.imageUrl=normalizeImageUrl(n.imageUrl);
  if(Number.isFinite(Number(n.mapX)))n.mapX=Number(n.mapX);
  if(Number.isFinite(Number(n.mapY)))n.mapY=Number(n.mapY);
}
function applyData(data){
  appData=data||{};
  nodes=data.nodes||{};
  rootIds=data.rootIds||[];
  Object.values(nodes).forEach(normalizeNode);
  rootIds=rootIds.filter(id=>nodes[id]);
}
function currentData(){
  appData.nodes=nodes;
  appData.rootIds=rootIds;
  if(!Array.isArray(appData.entities))appData.entities=[];
  appData.updatedAt=nowIso();
  return appData;
}
function saveLocal(){
  const data=currentData();
  localStorage.setItem(APP_KEY,JSON.stringify(data));
  localStorage.setItem(LEGACY_APP_KEY,JSON.stringify(data));
}
function scheduleCloudSave(){
  if(!isAdmin){setSyncLabel('觀看模式');return;}
  saveLocal();
  if(!gsUrl){setSyncLabel('本機已保存');return;}
  setSyncLabel('儲存中');
  clearTimeout(syncTimer);
  syncTimer=setTimeout(doCloudSave,700);
}
async function doCloudSave(){
  try{
    const params=new URLSearchParams();
    params.append('value',JSON.stringify(currentData()));
    if(isAdmin&&adminToken)params.append('adminToken',adminToken);
    const res=await fetch(gsUrl,{method:'POST',body:params});
    const json=await res.json();
    setSyncLabel(json.ok?'已同步':'儲存失敗');
  }catch(e){
    setSyncLabel('連線失敗');
  }
}
function loadLocal(){
  try{
    const raw=localStorage.getItem(APP_KEY)||localStorage.getItem(LEGACY_APP_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    applyData(data);
    return rootIds.length>0;
  }catch{return false;}
}
async function loadCloud(){
  if(!gsUrl)return false;
  setSyncLabel('雲端讀取中');
  try{
    const res=await fetch(gsUrl,{method:'GET'});
    const json=await res.json();
    if(json.ok&&json.data){
      const data=JSON.parse(json.data);
      applyData(data);
      localStorage.setItem(APP_KEY,JSON.stringify(data));
      localStorage.setItem(LEGACY_APP_KEY,JSON.stringify(data));
      setSyncLabel('已同步');
      return rootIds.length>0;
    }
  }catch(e){
    setSyncLabel('讀取失敗');
    return false;
  }
  setSyncLabel('本機資料');
  return false;
}
function applyZoom(){
  zoom=clamp(zoom,.45,2.2);
  const map=document.getElementById('map');
  const space=document.getElementById('map-space');
  const label=document.getElementById('zoom-label');
  if(map)map.style.transform=`scale(${zoom})`;
  if(space&&map){
    const baseW=Number(map.dataset.baseW)||map.offsetWidth||1200;
    const baseH=Number(map.dataset.baseH)||map.offsetHeight||760;
    space.style.width=Math.ceil(baseW*zoom)+'px';
    space.style.height=Math.ceil(baseH*zoom)+'px';
  }
  if(label)label.textContent=Math.round(zoom*100)+'%';
  localStorage.setItem(ZOOM_KEY,String(zoom));
}
function setZoomAt(value,clientX,clientY){
  const wrap=document.getElementById('map-wrap');
  const oldZoom=zoom||1;
  const rect=wrap?wrap.getBoundingClientRect():{left:0,top:0,width:0,height:0};
  const offsetX=wrap?(clientX-rect.left):0;
  const offsetY=wrap?(clientY-rect.top):0;
  const mapX=wrap?(wrap.scrollLeft+offsetX)/oldZoom:0;
  const mapY=wrap?(wrap.scrollTop+offsetY)/oldZoom:0;
  zoom=clamp(value,.45,2.2);
  applyZoom();
  if(wrap&&oldZoom){
    wrap.scrollLeft=Math.max(0,mapX*zoom-offsetX);
    wrap.scrollTop=Math.max(0,mapY*zoom-offsetY);
  }
}
function setZoom(value){
  const wrap=document.getElementById('map-wrap');
  if(!wrap){zoom=clamp(value,.45,2.2);applyZoom();return;}
  const rect=wrap.getBoundingClientRect();
  setZoomAt(value,rect.left+rect.width/2,rect.top+rect.height/2);
}
function zoomBy(delta){setZoom(zoom+delta);}
function resetZoom(){setZoom(1);}
function initZoomControls(){
  const wrap=document.getElementById('map-wrap');
  if(!wrap)return;
  wrap.addEventListener('wheel',e=>{
    if(!e.ctrlKey&&!e.metaKey)return;
    e.preventDefault();
    setZoomAt(zoom+(e.deltaY>0?-.08:.08),e.clientX,e.clientY);
  },{passive:false});
  let pinchStartDist=0;
  let pinchStartZoom=1;
  function touchDistance(touches){
    const dx=touches[0].clientX-touches[1].clientX;
    const dy=touches[0].clientY-touches[1].clientY;
    return Math.hypot(dx,dy);
  }
  function touchCenter(touches){
    return {
      x:(touches[0].clientX+touches[1].clientX)/2,
      y:(touches[0].clientY+touches[1].clientY)/2
    };
  }
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length!==2)return;
    pinchStartDist=touchDistance(e.touches);
    pinchStartZoom=zoom;
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length!==2||!pinchStartDist)return;
    const dist=touchDistance(e.touches);
    const center=touchCenter(e.touches);
    setZoomAt(pinchStartZoom*(dist/pinchStartDist),center.x,center.y);
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',e=>{
    if(e.touches.length<2)pinchStartDist=0;
  },{passive:true});
  wrap.addEventListener('touchcancel',()=>{pinchStartDist=0;},{passive:true});
}
function subtreeLeaves(id){
  const kids=(nodes[id]?.children||[]).filter(Boolean);
  if(!kids.length)return 1;
  return kids.reduce((sum,c)=>sum+subtreeLeaves(c),0);
}
function layout(){
  let y=60;
  rootIds.forEach(rootId=>{
    place(rootId,0,y);
    y+=subtreeLeaves(rootId)*140+80;
  });
}
function place(id,depth,startY){
  const kids=(nodes[id]?.children||[]).filter(Boolean);
  const leaves=subtreeLeaves(id);
  const autoX=80+depth*285;
  const autoY=startY+(leaves-1)*70;
  const x=Number.isFinite(Number(nodes[id]?.mapX))?Number(nodes[id].mapX):autoX;
  const y=Number.isFinite(Number(nodes[id]?.mapY))?Number(nodes[id].mapY):autoY;
  positions[id]={x,y};
  let childY=startY;
  kids.forEach(cid=>{
    place(cid,depth+1,childY);
    childY+=subtreeLeaves(cid)*140;
  });
}
function render(){
  const map=document.getElementById('map');
  const lines=document.getElementById('lines');
  map.querySelectorAll('.node,.empty').forEach(el=>el.remove());
  lines.innerHTML='';
  Object.keys(positions).forEach(k=>delete positions[k]);
  if(!rootIds.length){
    const empty=document.createElement('div');
    empty.className='empty';
    empty.textContent='目前沒有可顯示的筆記。請先回到筆記頁新增節點。';
    map.appendChild(empty);
    return;
  }
  layout();
  Object.entries(positions).forEach(([id,pos])=>drawNode(id,pos));
  Object.values(nodes).forEach(n=>(n.children||[]).forEach(cid=>drawLine(n.id,cid)));
  resizeMap();
  fitMap();
}
function drawNode(id,pos){
  const n=nodes[id];if(!n)return;
  const pal=PALETTE[n.ci]||PALETTE[0];
  const ts=TAG_STYLE[n.tag]||{bg:'#f0f0f0',color:'#666'};
  const el=document.createElement('button');
  el.className='node';
  el.style.left=pos.x+'px';
  el.style.top=pos.y+'px';
  el.style.borderColor=pal.border;
  el.style.borderLeftColor=pal.accent;
  el.innerHTML=`<span class="tag" style="background:${ts.bg};color:${ts.color}">${esc(n.tag)}</span><span class="status">${esc(n.status||'進行中')}</span><div class="node-title">${esc(n.title)}</div>${n.note?`<div class="node-note">${esc(n.note)}</div>`:''}`;
  initNodeDrag(el,id);
  el.onclick=()=>{
    if(el.dataset.dragged==='1'){el.dataset.dragged='';return;}
    openDetail(id);
  };
  document.getElementById('map').appendChild(el);
}
function initNodeDrag(el,id){
  if(!isAdmin)return;
  el.addEventListener('pointerdown',e=>{
    if(e.button!==undefined&&e.button!==0)return;
    const wrap=document.getElementById('map-wrap');
    const map=document.getElementById('map');
    const pos=positions[id]||{x:0,y:0};
    dragState={id,el,startX:e.clientX,startY:e.clientY,baseX:pos.x,baseY:pos.y,moved:false,wrap,map};
    el.setPointerCapture?.(e.pointerId);
    el.classList.add('dragging');
    e.preventDefault();
  });
  el.addEventListener('pointermove',e=>{
    if(!dragState||dragState.id!==id)return;
    const dx=(e.clientX-dragState.startX)/zoom;
    const dy=(e.clientY-dragState.startY)/zoom;
    if(Math.abs(dx)>3||Math.abs(dy)>3)dragState.moved=true;
    if(!dragState.moved)return;
    const x=Math.max(20,dragState.baseX+dx);
    const y=Math.max(20,dragState.baseY+dy);
    positions[id]={x,y};
    nodes[id].mapX=Math.round(x);
    nodes[id].mapY=Math.round(y);
    el.style.left=x+'px';
    el.style.top=y+'px';
    redrawLines();
    resizeMap();
    e.preventDefault();
  });
  el.addEventListener('pointerup',e=>finishNodeDrag(e,id));
  el.addEventListener('pointercancel',e=>finishNodeDrag(e,id));
}
function finishNodeDrag(e,id){
  if(!dragState||dragState.id!==id)return;
  const wasMoved=dragState.moved;
  dragState.el.classList.remove('dragging');
  if(wasMoved){
    nodes[id].updatedAt=nowIso();
    dragState.el.dataset.dragged='1';
    scheduleCloudSave();
  }
  dragState=null;
}
function drawLine(fromId,toId){
  const a=positions[fromId],b=positions[toId];if(!a||!b)return;
  const x1=a.x+210,y1=a.y+42,x2=b.x,y2=b.y+42;
  const mid=x1+(x2-x1)*.5;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',`M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
  p.setAttribute('fill','none');
  p.setAttribute('stroke','#c8bcae');
  p.setAttribute('stroke-width','2');
  document.getElementById('lines').appendChild(p);
}
function redrawLines(){
  const lines=document.getElementById('lines');
  lines.innerHTML='';
  Object.values(nodes).forEach(n=>(n.children||[]).forEach(cid=>drawLine(n.id,cid)));
}
function nodeEntityType(tag){
  if(tag==='NPC')return '角色';
  if(tag==='地點')return '城鎮';
  if(['角色','城鎮','組織','物品'].includes(tag))return tag;
  return tag||'角色';
}
function shouldSyncNodeToEntity(n){
  return !!n?.entityId||['NPC','地點','組織','物品','角色','城鎮'].includes(n?.tag);
}
function syncNodeToEntity(n){
  if(!n)return;
  if(!Array.isArray(appData.entities))appData.entities=[];
  let existing=n.entityId?appData.entities.find(e=>e.id===n.entityId):null;
  if(!existing)existing=appData.entities.find(e=>e.name===n.title)||null;
  const payload={
    id:existing?.id||entityUid(),
    name:n.title,
    type:nodeEntityType(n.tag),
    imageUrl:normalizeImageUrl(n.imageUrl||''),
    note:n.note||'',
    sourceNodeId:n.id,
    created:existing?.created||n.created||new Date().toLocaleDateString('zh-TW')
  };
  if(existing)Object.assign(existing,payload);
  else appData.entities.push(payload);
  n.entityId=payload.id;
}
function resizeMap(){
  const vals=Object.values(positions);
  const maxX=Math.max(1100,...vals.map(p=>p.x+320));
  const maxY=Math.max(700,...vals.map(p=>p.y+180));
  const map=document.getElementById('map');
  map.style.width=maxX+'px';
  map.style.height=maxY+'px';
  map.dataset.baseW=String(maxX);
  map.dataset.baseH=String(maxY);
  applyZoom();
}
function fitMap(){
  const wrap=document.getElementById('map-wrap');
  wrap.scrollLeft=Math.max(0,(document.getElementById('map-space').offsetWidth-wrap.clientWidth)/2);
  wrap.scrollTop=0;
}
function openDetail(id){
  const n=nodes[id];if(!n)return;
  activeDetailId=id;
  const ts=TAG_STYLE[n.tag]||{bg:'#f0f0f0',color:'#666'};
  const tag=document.getElementById('detail-tag');
  tag.textContent=n.tag;tag.style.background=ts.bg;tag.style.color=ts.color;
  document.getElementById('detail-title').textContent=n.title;
  document.getElementById('detail-note').textContent=n.note||'尚未填寫備註。';
  document.getElementById('detail-title-inp').value=n.title||'';
  document.getElementById('detail-tag-inp').value=n.tag||'事件';
  document.getElementById('detail-status-inp').value=n.status||'進行中';
  document.getElementById('detail-img-inp').value=n.imageUrl||'';
  document.getElementById('detail-note-inp').value=n.note||'';
  const img=document.getElementById('detail-img');
  const fallback=document.getElementById('detail-img-fallback');
  const imageUrl=normalizeImageUrl(n.imageUrl);
  if(fallback){fallback.style.display='none';fallback.href=openableImageUrl(n.imageUrl||imageUrl);}
  if(imageUrl){
    img.src=imageUrl;
    img.alt=n.title;
    img.style.display='';
    img.onclick=()=>openImage(n.imageUrl||imageUrl);
    img.onerror=()=>{
      img.style.display='none';
      if(fallback)fallback.style.display='inline-block';
    };
  }
  else{
    img.removeAttribute('src');
    img.style.display='none';
    img.onclick=null;
    if(fallback)fallback.style.display='none';
  }
  document.getElementById('detail-modal').classList.add('open');
}
function saveDetailEdit(){
  if(!isAdmin){alert('請先進入管理者模式。');return;}
  const n=nodes[activeDetailId];if(!n)return;
  const title=document.getElementById('detail-title-inp').value.trim();
  if(!title){alert('請輸入標題');return;}
  n.title=title;
  n.tag=document.getElementById('detail-tag-inp').value;
  n.status=document.getElementById('detail-status-inp').value;
  n.imageUrl=normalizeImageUrl(document.getElementById('detail-img-inp').value);
  n.note=document.getElementById('detail-note-inp').value;
  n.updatedAt=nowIso();
  if(shouldSyncNodeToEntity(n))syncNodeToEntity(n);
  scheduleCloudSave();
  render();
  openDetail(n.id);
}
async function init(){
  updateAdminUi();
  initZoomControls();
  const hasLocal=loadLocal();
  if(hasLocal)setSyncLabel('本機資料');
  if(gsUrl)await loadCloud();
  else setSyncLabel('未連結雲端');
  render();
  applyZoom();
}
init();
</script>
